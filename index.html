<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyJP News - Japanese Learning News</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <span class="logo-icon">N</span>
                <span class="logo-text">EasyJP News</span>
            </div>

            <div class="menu-group">
                <span class="menu-title">CATEGORIES</span>
                <nav class="nav-menu">
                    <a href="#" class="nav-item active" data-category="all"><i class="fa-solid fa-newspaper"></i> All News</a>
                    <a href="#" class="nav-item" data-category="sports"><i class="fa-solid fa-running"></i> Sports</a>
                    <a href="#" class="nav-item" data-category="education"><i class="fa-solid fa-graduation-cap"></i> Educational</a>
                    <a href="#" class="nav-item" data-category="society"><i class="fa-solid fa-building"></i> Society</a>
                </nav>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search news...">
                </div>
                <div class="navbar-actions">
                    <button class="toggle-btn">FURIGANA: ON</button>
                    <div class="profile-icon"><i class="fa-regular fa-user"></i></div>
                </div>
            </header>

            <div class="content-grid">
                <section class="news-feed">
                    <h2 class="section-title">RECENT NEWS</h2>
                    <div class="feed-list" id="feedList"></div>
                </section>

                <section class="article-viewer">
                    <article class="main-article">
                        <div class="article-meta">
                            <span class="badge category-badge">SOCIETY</span>
                            <span class="badge read-time"><i class="fa-regular fa-clock"></i> 2 MINS READ</span>
                        </div>
                        <h1 class="article-title" id="articleTitle">Loading headline assets...</h1>

                        <div class="article-image-container" style="margin-bottom: 24px; border-radius: 12px; overflow: hidden; max-height: 240px; border: 1px solid var(--border-color);">
                            <img id="articleMainImage" src="" alt="Article Visual Graphic Content View Window" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                        </div>

                        <div class="japanese-raw-box">
                            <p id="articleJapanese">Selecting feed data target array pointers stream container window elements initialized window...</p>
                        </div>

                        <div class="ai-reading-card">
                            <div class="ai-header">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> AI ASSISTED READING
                            </div>
                            <div class="ai-content" id="aiContentText"></div>
                        </div>

                        <div class="article-utilities">
                            <button class="util-btn active" data-tab="translate"><i class="fa-solid fa-language"></i> TRANSLATE</button>
                            <button class="util-btn" data-tab="simplify"><i class="fa-solid fa-baby"></i> EASY JP</button>
                            <button class="util-btn" data-tab="summary"><i class="fa-solid fa-list-check"></i> SUMMARY</button>
                            <button class="util-btn" data-tab="furigana"><i class="fa-solid fa-font"></i> FURIGANA</button>
                        </div>
                    </article>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
