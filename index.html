<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteFeed</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <span class="logo-icon">N</span>
                <span class="logo-text">NoteFeed</span>
            </div>

            <div class="menu-group">
                <span class="menu-title">CATEGORIES</span>
                <nav class="nav-menu">
                    <a href="#" class="nav-item active" data-category="all"><i class="fa-solid fa-newspaper"></i> All News</a>
                    <a href="#" class="nav-item" data-category="sports"><i class="fa-solid fa-running"></i> Sports</a>
                    <a href="#" class="nav-item" data-category="education"><i class="fa-solid fa-graduation-cap"></i> Educational</a>
                    <a href="#" class="nav-item" data-category="society"><i class="fa-solid fa-building"></i> Society</a>
                    <a href="#" class="nav-item" data-category="business"><i class="fa-solid fa-briefcase"></i> Business</a>
                    <a href="#" class="nav-item" data-category="technology"><i class="fa-solid fa-microchip"></i> Technology</a>
                    <a href="#" class="nav-item" data-category="entertainment"><i class="fa-solid fa-film"></i> Entertainment</a>
                </nav>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search news...">
                </div>
            </header>

            <div class="content-grid">
                <section class="news-feed">
                    <h2 class="section-title">RECENT NEWS</h2>
                    <div class="feed-list" id="feedList"></div>
                </section>

                <section class="article-viewer">
                    <article class="main-article">
                        <div class="article-meta">
                            <span class="badge category-badge" id="articleCategory">SOCIETY</span>
                            <span class="badge read-time" id="articleDate"><i class="fa-regular fa-calendar"></i> -- --</span>
                        </div>
                        
                        <h1 class="article-title" id="articleTitle">Loading headline assets...</h1>

                        <div class="article-image-container">
                            <img id="articleMainImage" src="" alt="Article Visual Content" style="display: none;">
                        </div>

                        <div class="japanese-raw-box">
                            <p id="articleJapanese">Selecting news item...</p>
                        </div>

                        <div class="ai-reading-card">
                            <div class="ai-header">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> AI ASSISTED READING
                            </div>
                            <div class="ai-content" id="aiContentText"></div>
                        </div>

                        <div class="article-utilities" style="grid-template-columns: repeat(3, 1fr);">
                            <button class="util-btn active" data-tab="translate"><i class="fa-solid fa-language"></i> TRANSLATE</button>
                            <button class="util-btn" data-tab="summary"><i class="fa-solid fa-list-check"></i> SUMMARY</button>
                            <a id="articleOriginalLink" href="#" target="_blank" class="source-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i> SOURCE</a>
                        </div>
                    </article>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
